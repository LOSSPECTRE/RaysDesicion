<!doctype html>
<html>
  <head>
    <link rel="icon" href="IMAGES/Bold black and white logo.png" />
    <title>Your Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0);
          opacity: 0.3;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .dot {
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        display: inline-block;
        animation: bounce 1.4s infinite ease-in-out;
      }

      .dot:nth-child(1) {
        animation-delay: 0s;
      }
      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }
    </style>
  </head>

  <body class="bg-black flex items-center justify-center min-h-screen">
    <div
      class="w-[375px] h-[812px] bg-zinc-950 rounded-[40px] border border-white/10 flex flex-col overflow-hidden text-white"
    >
      <!-- Splash -->
      <div
        id="splash"
        class="flex flex-col items-center justify-center h-full space-y-6"
      >
        <h1 class="text-3xl font-semibold">Your Assistant</h1>

        <!-- ONLY dots -->
        <div class="flex space-x-2">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

      <!-- Thinking -->
      <div
        id="thinking"
        class="hidden flex flex-col items-center justify-center h-full space-y-4"
      >
        <p id="thinkingText" class="text-zinc-400 text-sm"></p>
        <div class="flex space-x-2">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

      <!-- Login -->
      <div
        id="login"
        class="hidden flex flex-col justify-center items-center h-full px-6"
      >
        <div class="w-full space-y-5">
          <h1 class="text-2xl text-center">Your Assistant</h1>
          <h2 class="text-sm text-zinc-400 text-center">Welcome back</h2>

          <input
            id="username"
            placeholder="Username"
            class="w-full p-3 rounded bg-white/5 border border-white/10 text-center"
          />

          <input
            type="password"
            placeholder="Password"
            class="w-full p-3 rounded bg-white/5 border border-white/10 text-center"
          />

          <button onclick="login()" class="w-full bg-blue-600 p-3 rounded-lg">
            Login
          </button>
        </div>
      </div>

      <!-- Home -->
      <div id="home" class="hidden flex-1 flex flex-col">
        <div class="p-4 border-b border-white/10">
          <h1 class="text-lg">Welcome back</h1>
        </div>

        <div class="flex-1 p-4 space-y-6 overflow-y-auto">
          <!-- Spending -->
          <div>
            <label class="text-xs text-zinc-400">Daily Spending</label>
            <div class="flex bg-white/5 rounded-xl mt-2">
              <button
                onclick="changeValue('spending', -100)"
                class="px-4 py-3 text-lg"
              >
                −
              </button>
              <input
                id="spending"
                class="w-full text-center bg-transparent text-lg"
              />
              <button
                onclick="changeValue('spending', 100)"
                class="px-4 py-3 text-lg"
              >
                +
              </button>
            </div>
          </div>

          <!-- Sleep -->
          <div>
            <label class="text-xs text-zinc-400">Sleep Hours</label>
            <div class="flex bg-white/5 rounded-xl mt-2">
              <button
                onclick="changeValue('sleep', -1)"
                class="px-4 py-3 text-lg"
              >
                −
              </button>
              <input
                id="sleep"
                class="w-full text-center bg-transparent text-lg"
              />
              <button
                onclick="changeValue('sleep', 1)"
                class="px-4 py-3 text-lg"
              >
                +
              </button>
            </div>
          </div>

          <!-- Orders -->
          <div>
            <label class="text-xs text-zinc-400">Food Orders</label>
            <div class="flex bg-white/5 rounded-xl mt-2">
              <button
                onclick="changeValue('orders', -1)"
                class="px-4 py-3 text-lg"
              >
                −
              </button>
              <input
                id="orders"
                class="w-full text-center bg-transparent text-lg"
              />
              <button
                onclick="changeValue('orders', 1)"
                class="px-4 py-3 text-lg"
              >
                +
              </button>
            </div>
          </div>

          <button
            onclick="analyze()"
            class="w-full bg-blue-600 py-4 rounded-xl text-lg font-medium"
          >
            Analyze
          </button>

          <div id="result"></div>
        </div>
      </div>
    </div>
    <script>
      // Screen switching
      function showScreen(screen) {
        ["splash", "login", "home", "thinking"].forEach((id) => {
          document.getElementById(id).classList.add("hidden");
        });
        document.getElementById(screen).classList.remove("hidden");
      }

      /* Splash → Login (with dots visible) */
      setTimeout(() => {
        showScreen("login");
      }, 3000);

      /* LOGIN FLOW */
      function login() {
        const text = document.getElementById("thinkingText");

        text.innerText = "Logging in...";
        showScreen("thinking");

        setTimeout(() => {
          text.innerText = "Successfully logged in";

          setTimeout(() => {
            showScreen("home");
          }, 1500);
        }, 3000);
      }

      /* INPUT CONTROL */
      function changeValue(id, amount) {
        const input = document.getElementById(id);
        let value = parseFloat(input.value) || 0;

        value += amount;
        if (value < 0) value = 0;

        input.value = value;
      }

      /* ANALYZE (FIXED PROPERLY) */
      function analyze() {
        const resultDiv = document.getElementById("result");

        // Thinking state with dots
        resultDiv.innerHTML = `
    <div class="p-4 rounded-xl bg-white/5 text-center space-y-3">
      <p class="text-zinc-400">Thinking...</p>
      <div class="flex justify-center space-x-2">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  `;

        setTimeout(() => {
          const spending =
            parseFloat(document.getElementById("spending").value) || 0;
          const sleep = parseFloat(document.getElementById("sleep").value) || 0;
          const orders = parseInt(document.getElementById("orders").value) || 0;

          const messages = [];

          if (spending > 5000) {
            messages.push(
              "⚠️ You've been spending quite a bit today. You might want to slow down.",
            );
          } else {
            messages.push("💰 Your spending looks under control.");
          }

          if (sleep < 6) {
            messages.push(
              "😴 Your sleep is low. That could affect your decisions.",
            );
          } else {
            messages.push("🌙 Your sleep is in a healthy range.");
          }

          if (orders > 3) {
            messages.push(
              "🍔 You’ve been ordering food frequently. Cooking could help balance things.",
            );
          } else {
            messages.push("🥗 Your food habits look balanced.");
          }

          // ✅ ONE CLEAN BOX
          resultDiv.innerHTML = `
      <div class="bg-white/5 rounded-xl p-4 space-y-3">

        ${messages
          .map(
            (m, index) => `
          <div class="pb-2 ${index !== messages.length - 1 ? "border-b border-white/10" : ""}">
            ${m}
          </div>
        `,
          )
          .join("")}

      </div>
    `;
        }, 4000);
      }
    </script>
  </body>
</html>
